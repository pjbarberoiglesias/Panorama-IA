<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1420" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1000" height="1420" fill="#f0f2f8"/>

  <!-- header -->
  <text x="500" y="78" text-anchor="middle" font-size="44" font-weight="900" fill="url(#title-grad)">🌐 Panorama Global de la IA</text>
  <text x="500" y="116" text-anchor="middle" font-size="20" font-weight="700" fill="#475569">El ecosistema de la Inteligencia Artificial en 6 capas · junio 2026</text>

  <!-- stat chips -->
  <g font-weight="800" text-anchor="middle">
    <rect x="180" y="150" width="150" height="56" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#soft)"/>
    <text x="255" y="180" font-size="26" fill="#7c3aed">6</text><text x="255" y="198" font-size="11" font-weight="600" fill="#64748b">capas</text>
    <rect x="345" y="150" width="150" height="56" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#soft)"/>
    <text x="420" y="180" font-size="26" fill="#2563eb">17</text><text x="420" y="198" font-size="11" font-weight="600" fill="#64748b">modelos LLM</text>
    <rect x="510" y="150" width="150" height="56" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#soft)"/>
    <text x="585" y="180" font-size="26" fill="#0891b2">40+</text><text x="585" y="198" font-size="11" font-weight="600" fill="#64748b">herramientas</text>
    <rect x="675" y="150" width="150" height="56" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#soft)"/>
    <text x="750" y="180" font-size="26" fill="#ea580c">2M</text><text x="750" y="198" font-size="11" font-weight="600" fill="#64748b">tokens contexto</text>
  </g>

  <!-- ── CAPA 1 ── -->
  <g>
    <rect x="50" y="235" width="900" height="178" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="235" width="14" height="178" rx="7" fill="#7c3aed"/>
    <circle cx="125" cy="324" r="40" fill="#7c3aed"/>
    <text x="125" y="337" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">1</text>
    <text x="195" y="293" font-size="27" font-weight="800" fill="#7c3aed">🧠 Modelos Fundacionales</text>
    <text x="930" y="276" text-anchor="end" font-size="12" font-weight="800" fill="#7c3aed" letter-spacing="1">CAPA BASE</text>
    <text x="195" y="325" font-size="16" fill="#475569">El cerebro: todo el ecosistema se construye sobre ellos</text>
    <text x="195" y="365" font-size="16" font-weight="600" fill="#1f2937">Claude Fable 5 · Opus 4.8 · GPT-5.5 · Gemini 3.1 Pro · Grok 4.3 · DeepSeek V4</text>
    <text x="195" y="391" font-size="15" fill="#64748b">Open weights: Kimi K2.6 · Qwen 3.6 · GLM-5.1 · Llama 4 · Mistral Large 3 🇪🇺</text>
  </g>

  <!-- ── CAPA 2 ── -->
  <g>
    <rect x="50" y="425" width="900" height="178" rx="18" fill="#ffffff" stroke="#2563eb" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="425" width="14" height="178" rx="7" fill="#2563eb"/>
    <circle cx="125" cy="514" r="40" fill="#2563eb"/>
    <text x="125" y="527" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">2</text>
    <text x="195" y="483" font-size="27" font-weight="800" fill="#2563eb">💬 Asistentes IA</text>
    <text x="930" y="466" text-anchor="end" font-size="12" font-weight="800" fill="#2563eb" letter-spacing="1">REACTIVO → AGÉNTICO</text>
    <text x="195" y="515" font-size="16" fill="#475569">Conversan y cada vez más actúan solos (agent modes)</text>
    <text x="195" y="555" font-size="16" font-weight="600" fill="#1f2937">ChatGPT · Claude.ai · Gemini · Microsoft Copilot · Perplexity · Grok</text>
    <text x="195" y="581" font-size="15" fill="#64748b">Acceso web y móvil · planes desde gratis hasta $200/mes</text>
  </g>

  <!-- ── CAPA 3 ── -->
  <g>
    <rect x="50" y="615" width="900" height="178" rx="18" fill="#ffffff" stroke="#0891b2" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="615" width="14" height="178" rx="7" fill="#0891b2"/>
    <circle cx="125" cy="704" r="40" fill="#0891b2"/>
    <text x="125" y="717" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">3</text>
    <text x="195" y="673" font-size="27" font-weight="800" fill="#0891b2">💻 IDEs &amp; Agentes de Código</text>
    <text x="930" y="656" text-anchor="end" font-size="12" font-weight="800" fill="#0891b2" letter-spacing="1">DEV / CÓDIGO</text>
    <text x="195" y="705" font-size="16" fill="#475569">Planifican, escriben, depuran y despliegan software</text>
    <text x="195" y="745" font-size="16" font-weight="600" fill="#1f2937">Claude Code · Antigravity 2.0 · Cursor · Codex · GitHub Copilot · Devin</text>
    <text x="195" y="771" font-size="15" fill="#64748b">Devin Desktop (ex-Windsurf) · Kiro · Zed · Aider · JetBrains Junie</text>
  </g>

  <!-- ── CAPA 4 ── -->
  <g>
    <rect x="50" y="805" width="900" height="178" rx="18" fill="#ffffff" stroke="#ea580c" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="805" width="14" height="178" rx="7" fill="#ea580c"/>
    <circle cx="125" cy="894" r="40" fill="#ea580c"/>
    <text x="125" y="907" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">4</text>
    <text x="195" y="863" font-size="27" font-weight="800" fill="#ea580c">🤖 Agentes IA Generales</text>
    <text x="930" y="846" text-anchor="end" font-size="12" font-weight="800" fill="#ea580c" letter-spacing="1">ALTA AUTONOMÍA</text>
    <text x="195" y="895" font-size="16" fill="#475569">Reciben un objetivo y actúan en el mundo real</text>
    <text x="195" y="935" font-size="16" font-weight="600" fill="#1f2937">Manus · ChatGPT Agent · OpenClaw 🦞 · Claude Managed Agents</text>
    <text x="195" y="961" font-size="15" fill="#64748b">Gemini Deep Research · AutoGPT · web, email, archivos y apps</text>
  </g>

  <!-- ── CAPA 5 ── -->
  <g>
    <rect x="50" y="995" width="900" height="178" rx="18" fill="#ffffff" stroke="#16a34a" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="995" width="14" height="178" rx="7" fill="#16a34a"/>
    <circle cx="125" cy="1084" r="40" fill="#16a34a"/>
    <text x="125" y="1097" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">5</text>
    <text x="195" y="1053" font-size="27" font-weight="800" fill="#16a34a">🔧 Frameworks de Agentes &amp; MCP</text>
    <text x="930" y="1036" text-anchor="end" font-size="12" font-weight="800" fill="#16a34a" letter-spacing="1">DEV / TÉCNICO</text>
    <text x="195" y="1085" font-size="16" fill="#475569">Orquestan agentes con roles; MCP es el estándar de conexión</text>
    <text x="195" y="1125" font-size="16" font-weight="600" fill="#1f2937">LangGraph · CrewAI · MS Agent Framework · Claude Agent SDK · Google ADK</text>
    <text x="195" y="1151" font-size="15" fill="#64748b">MCP (Model Context Protocol) · el estándar de facto de 2026</text>
  </g>

  <!-- ── CAPA 6 ── -->
  <g>
    <rect x="50" y="1185" width="900" height="178" rx="18" fill="#ffffff" stroke="#db2777" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="1185" width="14" height="178" rx="7" fill="#db2777"/>
    <circle cx="125" cy="1274" r="40" fill="#db2777"/>
    <text x="125" y="1287" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">6</text>
    <text x="195" y="1243" font-size="27" font-weight="800" fill="#db2777">🖥️ Infraestructura Self-Hosted</text>
    <text x="930" y="1226" text-anchor="end" font-size="12" font-weight="800" fill="#db2777" letter-spacing="1">PRIVACIDAD TOTAL</text>
    <text x="195" y="1275" font-size="16" fill="#475569">En tu hardware: sin API keys, sin enviar datos, sin límites</text>
    <text x="195" y="1315" font-size="16" font-weight="600" fill="#1f2937">Ollama · vLLM · LM Studio · OpenClaude · Jan.ai · LocalAI · llama.cpp</text>
    <text x="195" y="1341" font-size="15" fill="#64748b">Ejecuta DeepSeek, Qwen, Llama, GLM... en local con 1 comando</text>
  </g>

  <!-- footer -->
  <text x="500" y="1400" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">Panorama Global de la IA · junio 2026 · pjbarberoiglesias.github.io/Panorama-IA</text>
</svg>
