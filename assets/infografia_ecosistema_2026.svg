<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1420" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" style="background-color:#0f172a">
  <defs>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1000" height="1420" fill="#0f172a"/>

  <!-- header -->
  <text x="500" y="78" text-anchor="middle" font-size="44" font-weight="900" fill="url(#title-grad)">🌐 Panorama Global de la IA</text>
  <text x="500" y="116" text-anchor="middle" font-size="20" font-weight="700" fill="#94a3b8">El ecosistema de la Inteligencia Artificial en 6 capas · junio 2026</text>

  <!-- stat chips -->
  <g font-weight="800" text-anchor="middle">
    <rect x="180" y="150" width="150" height="56" rx="12" fill="#1e293b" stroke="#334155" filter="url(#soft)"/>
    <text x="255" y="180" font-size="26" fill="#a855f7">6</text><text x="255" y="198" font-size="11" font-weight="600" fill="#94a3b8">capas</text>
    <rect x="345" y="150" width="150" height="56" rx="12" fill="#1e293b" stroke="#334155" filter="url(#soft)"/>
    <text x="420" y="180" font-size="26" fill="#3b82f6">17</text><text x="420" y="198" font-size="11" font-weight="600" fill="#94a3b8">modelos LLM</text>
    <rect x="510" y="150" width="150" height="56" rx="12" fill="#1e293b" stroke="#334155" filter="url(#soft)"/>
    <text x="585" y="180" font-size="26" fill="#06b6d4">40+</text><text x="585" y="198" font-size="11" font-weight="600" fill="#94a3b8">herramientas</text>
    <rect x="675" y="150" width="150" height="56" rx="12" fill="#1e293b" stroke="#334155" filter="url(#soft)"/>
    <text x="750" y="180" font-size="26" fill="#f97316">2M</text><text x="750" y="198" font-size="11" font-weight="600" fill="#94a3b8">tokens contexto</text>
  </g>

  <!-- ── CAPA 1 ── -->
  <g>
    <rect x="50" y="235" width="900" height="178" rx="18" fill="#1e293b" stroke="#a855f7" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="235" width="14" height="178" rx="7" fill="#a855f7"/>
    <circle cx="125" cy="324" r="40" fill="#a855f7"/>
    <text x="125" y="337" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">1</text>
    <text x="195" y="293" font-size="27" font-weight="800" fill="#a855f7">Modelos Fundacionales</text>
    <text x="930" y="276" text-anchor="end" font-size="12" font-weight="800" fill="#a855f7" letter-spacing="1">CAPA BASE</text>
    <text x="195" y="325" font-size="16" fill="#94a3b8">El cerebro: todo el ecosistema se construye sobre ellos</text>
    <text x="195" y="365" font-size="16" font-weight="600" fill="#f8fafc">Claude Fable 5 · Opus 4.8 · GPT-5.5 · Gemini 3.1 Pro · Grok 4.3 · DeepSeek V4</text>
    <text x="195" y="391" font-size="15" fill="#cbd5e1">Open weights: Kimi K2.6 · Qwen 3.6 · GLM-5.1 · Llama 4 · Mistral Large 3</text>
  </g>

  <!-- ── CAPA 2 ── -->
  <g>
    <rect x="50" y="425" width="900" height="178" rx="18" fill="#1e293b" stroke="#3b82f6" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="425" width="14" height="178" rx="7" fill="#3b82f6"/>
    <circle cx="125" cy="514" r="40" fill="#3b82f6"/>
    <text x="125" y="527" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">2</text>
    <text x="195" y="483" font-size="27" font-weight="800" fill="#3b82f6">Asistentes IA</text>
    <text x="930" y="466" text-anchor="end" font-size="12" font-weight="800" fill="#3b82f6" letter-spacing="1">REACTIVO → AGÉNTICO</text>
    <text x="195" y="515" font-size="16" fill="#94a3b8">Conversan y cada vez más actúan solos (agent modes)</text>
    <text x="195" y="555" font-size="16" font-weight="600" fill="#f8fafc">ChatGPT · Claude.ai · Gemini · Microsoft Copilot · Perplexity · Grok</text>
    <text x="195" y="581" font-size="15" fill="#cbd5e1">Acceso web y móvil · planes desde gratis hasta $200/mes</text>
  </g>

  <!-- ── CAPA 3 ── -->
  <g>
    <rect x="50" y="615" width="900" height="178" rx="18" fill="#1e293b" stroke="#06b6d4" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="615" width="14" height="178" rx="7" fill="#06b6d4"/>
    <circle cx="125" cy="704" r="40" fill="#06b6d4"/>
    <text x="125" y="717" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">3</text>
    <text x="195" y="673" font-size="27" font-weight="800" fill="#06b6d4">IDEs &amp; Agentes de Código</text>
    <text x="930" y="656" text-anchor="end" font-size="12" font-weight="800" fill="#06b6d4" letter-spacing="1">DEV / CÓDIGO</text>
    <text x="195" y="705" font-size="16" fill="#94a3b8">Planifican, escriben, depuran y despliegan software</text>
    <text x="195" y="745" font-size="16" font-weight="600" fill="#f8fafc">Claude Code · Antigravity 2.0 · Cursor · Codex · GitHub Copilot · Devin</text>
    <text x="195" y="771" font-size="15" fill="#cbd5e1">Devin Desktop (ex-Windsurf) · Kiro · Zed · Aider · JetBrains Junie</text>
  </g>

  <!-- ── CAPA 4 ── -->
  <g>
    <rect x="50" y="805" width="900" height="178" rx="18" fill="#1e293b" stroke="#f97316" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="805" width="14" height="178" rx="7" fill="#f97316"/>
    <circle cx="125" cy="894" r="40" fill="#f97316"/>
    <text x="125" y="907" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">4</text>
    <text x="195" y="863" font-size="27" font-weight="800" fill="#f97316">Agentes IA Generales</text>
    <text x="930" y="846" text-anchor="end" font-size="12" font-weight="800" fill="#f97316" letter-spacing="1">ALTA AUTONOMÍA</text>
    <text x="195" y="895" font-size="16" fill="#94a3b8">Reciben un objetivo y actúan en el mundo real</text>
    <text x="195" y="935" font-size="16" font-weight="600" fill="#f8fafc">Manus · ChatGPT Agent · OpenClaw · Claude Managed Agents</text>
    <text x="195" y="961" font-size="15" fill="#cbd5e1">Gemini Deep Research · AutoGPT · web, email, archivos y apps</text>
  </g>

  <!-- ── CAPA 5 ── -->
  <g>
    <rect x="50" y="995" width="900" height="178" rx="18" fill="#1e293b" stroke="#22c55e" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="995" width="14" height="178" rx="7" fill="#22c55e"/>
    <circle cx="125" cy="1084" r="40" fill="#22c55e"/>
    <text x="125" y="1097" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">5</text>
    <text x="195" y="1053" font-size="27" font-weight="800" fill="#22c55e">Frameworks de Agentes &amp; MCP</text>
    <text x="930" y="1036" text-anchor="end" font-size="12" font-weight="800" fill="#22c55e" letter-spacing="1">DEV / TÉCNICO</text>
    <text x="195" y="1085" font-size="16" fill="#94a3b8">Orquestan agentes con roles; MCP es el estándar de conexión</text>
    <text x="195" y="1125" font-size="16" font-weight="600" fill="#f8fafc">LangGraph · CrewAI · MS Agent Framework · Claude Agent SDK · Google ADK</text>
    <text x="195" y="1151" font-size="15" fill="#cbd5e1">MCP (Model Context Protocol) · el estándar de facto de 2026</text>
  </g>

  <!-- ── CAPA 6 ── -->
  <g>
    <rect x="50" y="1185" width="900" height="178" rx="18" fill="#1e293b" stroke="#ec4899" stroke-opacity="0.35" filter="url(#soft)"/>
    <rect x="50" y="1185" width="14" height="178" rx="7" fill="#ec4899"/>
    <circle cx="125" cy="1274" r="40" fill="#ec4899"/>
    <text x="125" y="1287" text-anchor="middle" font-size="38" font-weight="900" fill="#ffffff">6</text>
    <text x="195" y="1243" font-size="27" font-weight="800" fill="#ec4899">Infraestructura Self-Hosted</text>
    <text x="930" y="1226" text-anchor="end" font-size="12" font-weight="800" fill="#ec4899" letter-spacing="1">PRIVACIDAD TOTAL</text>
    <text x="195" y="1275" font-size="16" fill="#94a3b8">En tu hardware: sin API keys, sin enviar datos, sin límites</text>
    <text x="195" y="1315" font-size="16" font-weight="600" fill="#f8fafc">Ollama · vLLM · LM Studio · OpenClaude · Jan.ai · LocalAI · llama.cpp</text>
    <text x="195" y="1341" font-size="15" fill="#cbd5e1">Ejecuta DeepSeek, Qwen, Llama, GLM... en local con 1 comando</text>
  </g>

  <!-- footer -->
  <text x="500" y="1400" text-anchor="middle" font-size="14" font-weight="600" fill="#64748b">Panorama Global de la IA · junio 2026 · pjbarberoiglesias.github.io/Panorama-IA</text>
</svg>
